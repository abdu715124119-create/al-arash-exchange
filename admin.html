<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة العرش إكسبرس</title>

<style>
body{
font-family:Tahoma,Arial;
background:#0b2d5c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h2{
color:#0b2d5c;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#caa64b;
color:#fff;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#b58d2d;
}

#panel{
display:none;
}
</style>

</head>

<body>

<div class="box">

<div id="login">

<h2>لوحة إدارة العرش</h2>

<input id="user" placeholder="اسم المستخدم">

<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>

</div>


<div id="panel">

<h2>مرحباً بك</h2>

<p>تم الدخول إلى لوحة الإدارة</p>

<button onclick="logout()">خروج</button>

</div>


</div>


<script>

function login(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(user=="admin" && pass=="123456"){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

}else{

document.getElementById("msg").innerHTML="بيانات الدخول غير صحيحة";

}

}


function logout(){

document.getElementById("login").style.display="block";
document.getElementById("panel").style.display="none";

}

</script>


</body>
</html>

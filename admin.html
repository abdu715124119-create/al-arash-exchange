<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة العرش إكسبرس</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Tahoma,Arial;
background:#0b2d5c;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:360px;
box-shadow:0 0 20px #0005;
text-align:center;
}

h2{
color:#0b2d5c;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#caa64b;
color:white;
border:0;
border-radius:8px;
font-size:17px;
margin-top:10px;
}

#panel{
display:none;
}

.section{
border:1px solid #ddd;
padding:10px;
margin-top:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<div id="login">

<h2>لوحة إدارة العرش</h2>

<input id="user" placeholder="اسم المستخدم">

<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>

</div>


<div id="panel">

<h2>تعديل أسعار الصرف</h2>


<div class="section">
<h3>صنعاء - سعودي</h3>
<input id="sanaaSarBuy" placeholder="شراء">
<input id="sanaaSarSell" placeholder="بيع">
</div>


<div class="section">
<h3>صنعاء - دولار</h3>
<input id="sanaaUsdBuy" placeholder="شراء">
<input id="sanaaUsdSell" placeholder="بيع">
</div>


<div class="section">
<h3>عدن - سعودي</h3>
<input id="adenSarBuy" placeholder="شراء">
<input id="adenSarSell" placeholder="بيع">
</div>


<div class="section">
<h3>عدن - دولار</h3>
<input id="adenUsdBuy" placeholder="شراء">
<input id="adenUsdSell" placeholder="بيع">
</div>


<button onclick="saveRates()">💾 حفظ الأسعار</button>


<p id="result"></p>

</div>


</div>



<script>

const SUPABASE_URL="https://tmroykbcxddwbiufczea.supabase.co";

const SUPABASE_ANON_KEY="sb_publishable_8fINRVGTQ7ZVmm9pDyk4AQ_yNtRfoVf";


const db = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);



function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;


if(u=="admin" && p=="123456"){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

}else{

document.getElementById("msg").innerHTML="بيانات الدخول غير صحيحة";

}

}




async function saveRates(){


let rates=[

["صنعاء - سعودي","sanaaSarBuy","sanaaSarSell"],

["صنعاء - دولار","sanaaUsdBuy","sanaaUsdSell"],

["عدن - سعودي","adenSarBuy","adenSarSell"],

["عدن - دولار","adenUsdBuy","adenUsdSell"]

];


for(let r of rates){

await db
.from("exchange_rates")
.update({

buy_rate:document.getElementById(r[1]).value,

sell_rate:document.getElementById(r[2]).value

})
.eq("city",r[0]);

}


document.getElementById("result").innerHTML="تم حفظ الأسعار بنجاح ✅";


}

</script>


</body>
</html>
